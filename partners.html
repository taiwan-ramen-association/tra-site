<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icon/03.png">
  <meta name="google-adsense-account" content="ca-pub-6476285123291834">
  <title>合作夥伴 | 台灣拉麵協會</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6476285123291834" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    main { max-width: 960px; margin: 0 auto; padding: 80px 24px 120px; }
    .page-title { font-family: 'Noto Serif TC', serif; font-size: clamp(28px, 4vw, 44px); font-weight: 900; letter-spacing: 0.06em; margin-bottom: 64px; }

    .partners-section { margin-bottom: 56px; }
    .partners-section-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 14px;
      margin-bottom: 20px;
    }
    .partners-section-header.is-member { border-bottom-color: var(--red); }
    .partners-section-num { font-size: 9px; letter-spacing: 4px; color: var(--red); }
    .partners-section-title { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 900; letter-spacing: 3px; }
    .partners-section-desc { font-size: 12px; color: var(--muted); line-height: 1.8; margin-bottom: 20px; }

    .partners-grid {
      display: grid;
      gap: 1px;
      background: var(--line);
    }
    .partners-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .partners-grid-3 { grid-template-columns: repeat(3, 1fr); }
    .partners-grid-auto { grid-template-columns: repeat(4, 1fr); }

    .partner-card {
      background: var(--paper);
      aspect-ratio: 2/1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      transition: opacity 0.2s;
    }
    .partner-card.is-member { background: var(--white); }
    .partner-card.has-link:hover { opacity: 0.7; cursor: pointer; }
    .partner-card img { max-height: 80px; max-width: 100%; width: auto; object-fit: contain; }
    .member-badge {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--white);
      background: var(--red);
      padding: 2px 6px;
    }

    #status { font-size: 13px; color: var(--muted); letter-spacing: 1px; padding: 40px 0; }

    @media (max-width: 600px) {
      main { padding: 60px 20px 80px; }
      .partners-grid-4, .partners-grid-3, .partners-grid-auto { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">台灣<span>拉麵</span>協會</a>
    <a href="index.html" class="nav-back">← 返回首頁</a>
  </nav>

  <main>
    <p class="page-label">PARTNERS</p>
    <h1 class="page-title">合作夥伴</h1>
    <p id="status">載入中…</p>
    <div id="partners-body"></div>
  </main>

  <script>
    const CATEGORIES = [
      {
        key: 'member',
        label: '協會會員店家',
        sublabel: 'MEMBER SHOPS',
        desc: '已正式加入台灣拉麵協會之會員店家。',
        isMember: true
      },
      {
        key: 'ramen',
        label: '合作拉麵店',
        sublabel: 'RAMEN PARTNERS',
        desc: '與協會有合作關係之拉麵店家。',
        isMember: false
      },
      {
        key: 'partner',
        label: '合作商家',
        sublabel: 'BUSINESS PARTNERS',
        desc: '與協會有合作關係之在地商家與企業。',
        isMember: false
      }
    ];

    fetch('partners.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('status').remove();
        const body = document.getElementById('partners-body');

        const groups = {};
        data.forEach(p => {
          if (!groups[p.category]) groups[p.category] = [];
          groups[p.category].push(p);
        });

        CATEGORIES.forEach((cat, i) => {
          const items = groups[cat.key];
          if (!items || !items.length) return;

          const sec = document.createElement('div');
          sec.className = 'partners-section';

          const colClass = items.length <= 3 ? 'partners-grid-3' : 'partners-grid-4';

          sec.innerHTML = `
            <div class="partners-section-header${cat.isMember ? ' is-member' : ''}">
              <span class="partners-section-num">${String(i + 1).padStart(2, '0')}</span>
              <span class="partners-section-title">${cat.label}</span>
              <span style="font-size:9px;letter-spacing:3px;color:var(--muted);">${cat.sublabel}</span>
            </div>
            <p class="partners-section-desc">${cat.desc}</p>
            <div class="partners-grid ${colClass}" id="pg-${cat.key}"></div>`;
          body.appendChild(sec);

          const grid = document.getElementById('pg-' + cat.key);
          items.forEach(p => {
            const card = document.createElement('div');
            card.className = 'partner-card' + (cat.isMember ? ' is-member' : '') + (p.url ? ' has-link' : '');
            const badge = cat.isMember ? '<span class="member-badge">MEMBER</span>' : '';
            const img = `<img src="${p.logo}" alt="${p.name}">`;
            card.innerHTML = badge + (p.url
              ? `<a href="${p.url}" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${img}</a>`
              : img);
            grid.appendChild(card);
          });
        });
      })
      .catch(() => {
        document.getElementById('status').textContent = '載入失敗，請稍後再試。';
      });
  </script>
</body>
</html>
