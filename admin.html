<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/icons/03.png">
<title>會員管理 ─ 台灣拉麵協會</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #C8272D;
    --red-dark: #9b1e23;
    --ink: #1a1209;
    --paper: #faf7f2;
    --stone: #8a7d6e;
    --line: #e8e0d4;
    --white: #ffffff;
  }
  body {
    font-family: 'Noto Sans TC', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }
  header {
    background: var(--red);
    color: var(--white);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: 1px; }
  header a { color: var(--white); font-size: 13px; text-decoration: none; opacity: 0.85; }
  header a:hover { opacity: 1; }

  #gate {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
  }
  #gate p { color: var(--stone); font-size: 14px; }
  .btn-google {
    display: flex; align-items: center; gap: 8px;
    background: var(--white); border: 1px solid var(--line);
    padding: 10px 20px; border-radius: 8px;
    font-size: 14px; cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .btn-google:hover { background: #f5f5f5; }
  .btn-google svg { width: 18px; height: 18px; }

  #app { display: none; max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
  }
  .toolbar h2 { font-size: 18px; font-weight: 700; }
  .toolbar select {
    padding: 6px 12px; border: 1px solid var(--line);
    border-radius: 6px; font-size: 13px; background: var(--white);
  }

  .table-wrap { overflow-x: auto; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
  table { width: 100%; border-collapse: collapse; background: var(--white); white-space: nowrap; }
  thead { background: var(--red); color: var(--white); }
  th { padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 500; }
  td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid var(--line); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdf5f5; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    object-fit: cover; vertical-align: middle; margin-right: 8px;
  }
  .name-cell { display: flex; align-items: center; }

  .role-select {
    padding: 4px 8px; border: 1px solid var(--line);
    border-radius: 6px; font-size: 12px; background: var(--white);
    cursor: pointer;
  }
  .role-select:focus { outline: 2px solid var(--red); }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
  }
  .badge-viewer          { background: #f0f0f0; color: #555; }
  .badge-store           { background: #e8f4fd; color: #1a6fa8; }
  .badge-member_individual { background: #fff3cd; color: #856404; }
  .badge-member_group    { background: #d1ecf1; color: #0c5460; }
  .badge-member_sponsor  { background: #d4edda; color: #155724; }
  .badge-member_honorary { background: #f8d7da; color: #721c24; }
  .badge-director        { background: #e2d9f3; color: #4a235a; }
  .badge-admin           { background: var(--red); color: var(--white); }
  .badge-warned          { background: #ff9900; color: #fff; }

  .save-btn {
    padding: 4px 12px; background: var(--red); color: var(--white);
    border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
    opacity: 0; transition: opacity 0.15s;
  }
  .save-btn.visible { opacity: 1; }
  .save-btn:hover { background: var(--red-dark); }
  .clear-btn {
    padding: 4px 10px; background: #cc3300; color: var(--white);
    border: none; border-radius: 6px; font-size: 11px; cursor: pointer;
    white-space: nowrap; transition: opacity 0.15s;
  }
  .clear-btn:hover { background: #aa2200; }
  .stat-num { font-weight: 600; font-size: 12px; color: var(--ink); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    z-index: 999;
  }
  .toast.show { opacity: 1; }

  #loading { text-align: center; padding: 60px; color: var(--stone); font-size: 14px; }

  .settings-card {
    background: var(--white); border-radius: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    padding: 20px 24px; margin-top: 28px;
  }
  .settings-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 480px) { .settings-grid { grid-template-columns: 1fr; } }
  .settings-field label { display: block; font-size: 11px; color: var(--stone); margin-bottom: 4px; letter-spacing: 0.4px; }
  .settings-field input {
    width: 100%; padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 7px; font-size: 14px; background: var(--paper);
    font-family: inherit;
  }
  .settings-field input:focus { outline: 2px solid var(--red); border-color: transparent; }
  .settings-hint { font-size: 11px; color: var(--stone); margin-top: 3px; }
  .settings-footer { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
  .settings-save {
    padding: 8px 20px; background: var(--red); color: var(--white);
    border: none; border-radius: 7px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: opacity 0.15s;
  }
  .settings-save:hover { opacity: 0.85; }
  .settings-status { font-size: 12px; color: var(--stone); }
</style>
</head>
<body>

<header>
  <h1>🍜 台灣拉麵協會 ─ 會員管理</h1>
  <div style="display:flex;gap:16px;align-items:center">
    <a href="finder-beta.html" target="_blank" style="color:#ffd;font-size:13px;text-decoration:none;background:rgba(255,255,255,0.15);padding:4px 10px;border-radius:6px;">🧪 開啟 BETA</a>
    <a href="finder.html">← 回查詢頁</a>
  </div>
</header>

<!-- 未登入 / 非管理員畫面 -->
<div id="gate">
  <p id="gateMsg">驗證中…</p>
  <button class="btn-google" id="loginBtn" style="display:none">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.4 30.2 0 24 0 14.7 0 6.8 5.4 3 13.3l7.8 6C12.7 13.2 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 6.9-10.1 6.9-17z"/><path fill="#FBBC05" d="M10.8 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.7-4.7L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.4 10.6l8.4-5.9z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-3.7-13.2-9l-7.8 6C6.8 42.6 14.7 48 24 48z"/></svg>
    以 Google 帳號登入
  </button>
</div>

<!-- 管理員主畫面 -->
<div id="app">
  <div class="toolbar">
    <h2>會員清單</h2>
    <select id="roleFilter">
      <option value="">全部身份</option>
      <option value="viewer">viewer</option>
      <option value="store">store</option>
      <option value="member_individual">個人會員</option>
      <option value="member_group">團體會員</option>
      <option value="member_sponsor">贊助會員</option>
      <option value="member_honorary">榮譽會員</option>
      <option value="director">協會幹部</option>
      <option value="admin">admin</option>
    </select>
  </div>
  <div id="loading">載入中…</div>
  <div class="table-wrap">
  <table id="userTable" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>Google 帳號</th>
        <th>顯示身份</th>
        <th>Email</th>
        <th>目前身份</th>
        <th>等級</th>
        <th>收藏</th>
        <th>踩點</th>
        <th>最後登入</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="userTbody"></tbody>
  </table>
  </div>
</div>

<div class="settings-card" id="settingsCard" style="display:none">
  <h3>⚙️ 排隊回報設定</h3>
  <div class="settings-grid">
    <div class="settings-field">
      <label>開店前幾小時內可回報</label>
      <input type="number" id="settingPreOpenHours" min="1" max="12" step="0.5" value="4">
      <div class="settings-hint">例：4 = 開店前 4 小時內才能回報；超過此時間提交視為無效並扣信任分</div>
    </div>
    <div class="settings-field">
      <label>GPS 距離限制（公尺）</label>
      <input type="number" id="settingGpsRadius" min="100" max="2000" step="50" value="500">
      <div class="settings-hint">例：500 = 距離店家 500 公尺內才能回報；設太大失去意義，建議 300–800</div>
    </div>
  </div>
  <div class="settings-footer">
    <button class="settings-save" id="settingsSaveBtn">儲存設定</button>
    <span class="settings-status" id="settingsStatus"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdN0AYZMM2AU66QcH4BVNJHx1plwQBBYc",
  authDomain: "taiwan-ramen-association.firebaseapp.com",
  projectId: "taiwan-ramen-association",
  storageBucket: "taiwan-ramen-association.firebasestorage.app",
  messagingSenderId: "66234065738",
  appId: "1:66234065738:web:eb9fc4348a942da66ad7b3"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

const ROLES = [
  { value: 'viewer',           label: 'viewer（一般用戶）' },
  { value: 'store',            label: 'store（店家）' },
  { value: 'member_individual',label: '個人會員' },
  { value: 'member_group',     label: '團體會員' },
  { value: 'member_sponsor',   label: '贊助會員' },
  { value: 'member_honorary',  label: '榮譽會員' },
  { value: 'director',         label: '協會幹部' },
  { value: 'warned',           label: '⚠️ 警示用戶' },
  { value: 'admin',            label: 'admin' },
];

const ROLE_LABELS = {
  viewer: '一般用戶', store: '店家',
  member_individual: '個人會員', member_group: '團體會員',
  member_sponsor: '贊助會員', member_honorary: '榮譽會員',
  director: '協會幹部', warned: '⚠️ 警示用戶', admin: 'Admin',
};

let allUsers = [];

document.getElementById('loginBtn').addEventListener('click', () => {
  auth.signInWithPopup(provider).catch(console.error);
});

auth.onAuthStateChanged(async user => {
  const gate   = document.getElementById('gate');
  const app    = document.getElementById('app');
  const gateMsg= document.getElementById('gateMsg');
  const loginBtn = document.getElementById('loginBtn');

  if (!user) {
    gateMsg.textContent = '請以管理員 Google 帳號登入';
    loginBtn.style.display = 'flex';
    gate.style.display = 'flex';
    app.style.display  = 'none';
    return;
  }

  // 確認是否為 admin
  const snap = await db.collection('users').doc(user.uid).get();
  const data = snap.data();

  if (!data || data.role !== 'admin') {
    gateMsg.textContent = `⛔ 權限不足（${user.email}）`;
    loginBtn.style.display = 'none';
    gate.style.display = 'flex';
    app.style.display  = 'none';
    return;
  }

  gate.style.display = 'none';
  app.style.display  = 'block';
  loadUsers();
  loadQueueSettings();
});

async function loadUsers() {
  const snap = await db.collection('users').get();
  allUsers = snap.docs
    .map(d => ({ uid: d.id, ...d.data() }))
    .sort((a, b) => (a.memberNo ?? Infinity) - (b.memberNo ?? Infinity));

  // Batch-fetch userVisits for all users
  const visitsSnaps = await Promise.all(
    allUsers.map(u => db.collection('userVisits').doc(u.uid).get())
  );
  const visitsMap = {};
  visitsSnaps.forEach((s, i) => {
    visitsMap[allUsers[i].uid] = s.exists ? s.data() : {};
  });

  renderTable(allUsers, visitsMap);
}

let _visitsMapGlobal = {};

document.getElementById('roleFilter').addEventListener('change', e => {
  const val = e.target.value;
  renderTable(val ? allUsers.filter(u => u.role === val) : allUsers, _visitsMapGlobal);
});

function renderTable(users, visitsMap) {
  _visitsMapGlobal = visitsMap || {};
  const tbody = document.getElementById('userTbody');
  const table = document.getElementById('userTable');
  const loading = document.getElementById('loading');
  loading.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = users.map(u => {
    const lastLogin = u.lastLogin
      ? new Date(u.lastLogin.seconds * 1000).toLocaleDateString('zh-TW')
      : '─';
    const roleOptions = ROLES.map(r =>
      `<option value="${r.value}" ${u.role === r.value ? 'selected' : ''}>${r.label}</option>`
    ).join('');
    const googleAvatar = u.photoURL || 'assets/icons/03.png';
    const customAvatar = u.avatarUrl || googleAvatar;
    const nickname     = u.nickname || '<span style="color:#bbb;font-style:italic">未設定</span>';
    const favCount     = (u.favorites || []).length;
    const vData        = (_visitsMapGlobal[u.uid] || {}).visits || {};
    const stampCount   = Object.values(vData).filter(v => v > 0).length;
    return `
      <tr data-uid="${u.uid}">
        <td style="color:var(--stone);font-size:12px;white-space:nowrap">${u.memberNo ?? '─'}</td>
        <td>
          <div class="name-cell">
            <img class="avatar" src="${googleAvatar}" onerror="this.src='assets/icons/03.png'">
            ${u.displayName || '（未命名）'}
          </div>
        </td>
        <td>
          <div class="name-cell">
            <img class="avatar" src="${customAvatar}" onerror="this.src='assets/icons/03.png'">
            ${nickname}
          </div>
        </td>
        <td>${u.email || '─'}</td>
        <td><span class="badge badge-${u.role}">${ROLE_LABELS[u.role] || u.role}</span></td>
        <td>Lv.${u.level ?? 0}</td>
        <td class="stat-num">${favCount || '─'}</td>
        <td class="stat-num">${stampCount || '─'}</td>
        <td>${lastLogin}</td>
        <td style="white-space:nowrap">
          <select class="role-select" data-uid="${u.uid}" data-original="${u.role}">
            ${roleOptions}
          </select>
          <button class="save-btn" data-uid="${u.uid}">儲存</button>
          <button class="clear-btn" data-uid="${u.uid}" data-name="${u.displayName || u.email || u.uid}">🗑</button>
        </td>
      </tr>`;
  }).join('');

  // 下拉變更時顯示儲存按鈕
  tbody.querySelectorAll('.role-select').forEach(sel => {
    sel.addEventListener('change', () => {
      const btn = tbody.querySelector(`.save-btn[data-uid="${sel.dataset.uid}"]`);
      btn.classList.toggle('visible', sel.value !== sel.dataset.original);
    });
  });

  // 儲存按鈕
  tbody.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const uid = btn.dataset.uid;
      const sel = tbody.querySelector(`.role-select[data-uid="${uid}"]`);
      const newRole = sel.value;
      btn.disabled = true; btn.textContent = '…';
      try {
        await db.collection('users').doc(uid).update({ role: newRole });
        sel.dataset.original = newRole;
        btn.classList.remove('visible');
        const row = tbody.querySelector(`tr[data-uid="${uid}"]`);
        row.querySelector('.badge').className = `badge badge-${newRole}`;
        row.querySelector('.badge').textContent = ROLE_LABELS[newRole] || newRole;
        const u = allUsers.find(x => x.uid === uid);
        if (u) u.role = newRole;
        showToast(`✓ ${sel.options[sel.selectedIndex].label} 已套用`);
      } catch (e) { showToast('❌ 儲存失敗：' + e.message); }
      btn.disabled = false; btn.textContent = '儲存';
    });
  });

  // 一鍵清除
tbody.querySelectorAll('.clear-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const uid  = btn.dataset.uid;
    const name = btn.dataset.name;

    if (!confirm(`確定要清除「${name}」的所有收藏與踩點記錄嗎？\n此操作無法復原。`)) return;
    if (!confirm(`再次確認：清除「${name}」的所有記憶？`)) return;

    btn.disabled = true;
    btn.textContent = '…';

    try {
      // ✅ 不會因為文件不存在而失敗
      await db.collection('users').doc(uid).set({
        favorites: firebase.firestore.FieldValue.delete()
      }, { merge: true });

      // ✅ 刪除踩點
      await db.collection('userVisits').doc(uid).delete();

      // UI 更新（防呆）
      const row = tbody.querySelector(`tr[data-uid="${uid}"]`);
      if (row) {
        const cells = row.querySelectorAll('.stat-num');
        cells[0].textContent = '─';
        cells[1].textContent = '─';
      }

      showToast(`✓ 已清除 ${name} 的記憶`);

    } catch (e) {
      console.error(e);
      showToast('❌ 清除失敗：' + e.message);
    }

    btn.disabled = false;
    btn.textContent = '🗑';
  });
});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── 排隊回報設定 ────────────────────────────────────────────────────
async function loadQueueSettings() {
  try {
    const snap = await db.collection('meta').doc('queueSettings').get();
    if (snap.exists) {
      const d = snap.data();
      if (d.preOpenHours  != null) document.getElementById('settingPreOpenHours').value = d.preOpenHours;
      if (d.gpsRadiusMeters != null) document.getElementById('settingGpsRadius').value  = d.gpsRadiusMeters;
    }
  } catch(e) { console.warn('載入排隊設定失敗', e); }
  document.getElementById('settingsCard').style.display = '';
}

document.getElementById('settingsSaveBtn').addEventListener('click', async () => {
  const hours  = parseFloat(document.getElementById('settingPreOpenHours').value);
  const radius = parseInt(document.getElementById('settingGpsRadius').value, 10);
  const status = document.getElementById('settingsStatus');

  if (isNaN(hours) || hours < 1 || hours > 12) { status.textContent = '⚠️ 小時數需在 1–12 之間'; return; }
  if (isNaN(radius) || radius < 100 || radius > 2000) { status.textContent = '⚠️ 距離需在 100–2000 公尺之間'; return; }

  const btn = document.getElementById('settingsSaveBtn');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    await db.collection('meta').doc('queueSettings').set({ preOpenHours: hours, gpsRadiusMeters: radius });
    status.textContent = `✅ 已儲存（${new Date().toLocaleTimeString('zh-TW')}）`;
    showToast('✅ 排隊設定已更新');
  } catch(e) {
    status.textContent = '❌ 儲存失敗';
    showToast('❌ 儲存失敗：' + e.message);
  }
  btn.disabled = false; btn.textContent = '儲存設定';
});
</script>
</body>
</html>
