document.getElementById('queueBackdrop').addEventListener('click', closeQueueModal);
document.getElementById('qmCancelBtn').addEventListener('click', closeQueueModal);
document.getElementById('qmConfirmBtn').addEventListener('click', submitQueueReport);
document.querySelectorAll('.qm-opt').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.qm-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    _queueSelected = parseInt(el.dataset.value, 10);
    document.getElementById('qmConfirmBtn').disabled = false;
  });
});

document.querySelectorAll('.sm-option').forEach(el => {
  el.addEventListener('click', () => {
    _stampStatus = el.dataset.status;
    if (_stampStatus === 'many' && _stampCount < 2) _stampCount = 2;
    updateSmOptions();
    updateSlider();
  });
});

document.getElementById('smCountSlider').addEventListener('input', e => {
  _stampCount = parseInt(e.target.value);
  updateSliderLabel(_stampCount);
});

document.getElementById('smReview').addEventListener('input', e => {
  document.getElementById('smReviewCount').textContent = e.target.value.length;
});

document.getElementById('smConfirmBtn').addEventListener('click', async () => {
  const shopId = _stampShopId;
  if (!shopId || !auth.currentUser) return;
  const val    = getStampVal();
  const review = document.getElementById('smReview').value.trim();
  stampMap[shopId] = val;
  if (review) reviewMap[shopId] = review; else delete reviewMap[shopId];
  try {
    const uid = auth.currentUser.uid;
    await db.collection('userVisits').doc(uid).set({ visits: { [shopId]: val } }, { merge: true });
    if (review) {
      await db.collection('userVisits').doc(uid).set({ reviews: { [shopId]: review } }, { merge: true });
    } else {
      await db.collection('userVisits').doc(uid).update({
        [`reviews.${shopId}`]: firebase.firestore.FieldValue.delete()
      }).catch(() => {});
    }
    document.querySelectorAll(`.stamp-btn[data-id="${shopId}"]`).forEach(b => b.classList.add('stamped'));
    closeStampModal();
    const lbl = _stampStatus === 'many'
      ? `吃過${_stampCount >= 10 ? '10+' : _stampCount}次`
      : STATUS_LABELS[_stampStatus];
    showStampToast(`✓ 踩點：${lbl}`);
  } catch (e) { showStampToast('踩點失敗：' + e.message); }
});

document.getElementById('smResetBtn').addEventListener('click', async () => {
  if (!confirm(`確定要清除「${_stampShopName}」的踩點記錄嗎？\n此操作無法復原。`)) return;
  const shopId = _stampShopId;
  if (!shopId || !auth.currentUser) return;
  delete stampMap[shopId]; delete reviewMap[shopId];
  try {
    await db.collection('userVisits').doc(auth.currentUser.uid).update({
      [`visits.${shopId}`]:  firebase.firestore.FieldValue.delete(),
      [`reviews.${shopId}`]: firebase.firestore.FieldValue.delete(),
    });
    document.querySelectorAll(`.stamp-btn[data-id="${shopId}"]`).forEach(b => b.classList.remove('stamped'));
    closeStampModal();
    showStampToast('已清除踩點記錄');
  } catch (e) { showStampToast('重置失敗：' + e.message); }
});

// ── applyFeatureFlags ───────────────────────────────────────────────────────
function applyFeatureFlags() {
  // 收藏清單按鈕（profile dropdown + filter btn）
  const favFilterBtn = document.getElementById('favFilterBtn');
  if (favFilterBtn) favFilterBtn.style.display = canView('favorites') ? 'flex' : 'none';

  // 排行榜按鈕（profile dropdown）
  const rkPdBtn = document.getElementById('rankingsPdBtn');
  if (rkPdBtn) rkPdBtn.style.display = canView('rankings') ? '' : 'none';

  // 制霸地圖連結
  const domLink = document.querySelector('.pd-action[href="domination.html"]');
  if (domLink) domLink.style.display = canView('domination') ? '' : 'none';
}

// ── Rankings Modal ─────────────────────────────────────────────────────────
let _rkTab = 'current';

function openRankingsModal() {
  if (!canUse('rankings')) { showStampToast('🔒 排行榜暫不開放'); return; }
  document.getElementById('drawer').style.display = 'none';
  document.getElementById('drawerBackdrop').style.display = 'none';
  _rkTab = 'current';
  document.querySelectorAll('.rk-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'current'));
  document.getElementById('rkBackdrop').style.display = 'block';
  document.getElementById('rkModal').style.display    = 'block';
  loadRankings('current');
}

function closeRankingsModal() {
  document.getElementById('rkBackdrop').style.display = 'none';
  document.getElementById('rkModal').style.display    = 'none';
}

function currentMonthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function lastMonthKey() {
  const d = new Date();
  d.setMonth(d.getMonth() - 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

async function loadRankings(tab) {
  const body = document.getElementById('rkBody');
  body.innerHTML = '<div class="rk-empty">載入中...</div>';
  const key  = tab === 'current' ? currentMonthKey() : lastMonthKey();
  let rankDoc = null;
  try {
    const snap = await db.collection('rankings').doc(key).get();
    rankDoc = snap.exists ? snap.data() : null;
  } catch(e) {}

  const uid  = auth.currentUser?.uid;
  let userDoc = null;
  if (uid) {
    try {
      const snap = await db.collection('users').doc(uid).get();
      userDoc = snap.exists ? snap.data() : null;
    } catch(e) {}
  }

  body.innerHTML = renderRankings(tab, rankDoc, userDoc, uid);
}

function renderRankings(tab, rankDoc, userDoc, uid) {
  const parts = [];

  // ── 用戶狀態卡 ──
  if (userDoc) {
    const total    = userDoc.reportCount      || 0;
    const placed   = total >= 20;
    const pct      = Math.min(100, Math.round(total / 20 * 100));
    parts.push(`<div class="rk-me-card">
      <div class="rk-me-label">你的回報狀況</div>
      <div class="rk-me-row">
        <div class="rk-me-stat">
          <div class="rk-me-num">${total}</div>
          <div class="rk-me-sub">累計回報</div>
        </div>
        <div style="flex:1;padding:0 12px">
          ${placed
            ? `<div style="font-size:13px;color:var(--red);font-weight:600">✅ 已出水，可參與排名</div>`
            : `<div class="rk-placement-bar"><div class="rk-placement-fill" style="width:${pct}%"></div></div>
               <div class="rk-placement-hint">累計 ${total} / 20 次可出水參與排名</div>`}
        </div>
      </div>
    </div>`);
  }

  // ── 排行榜內容 ──
  if (!rankDoc) {
    const label = tab === 'current' ? '本月排行榜尚未公布，月底前會自動計算。' : '上月尚無排行資料。';
    parts.push(`<div class="rk-empty">${label}</div>`);
    return parts.join('');
  }

  const top3     = rankDoc.top3     || [];
  const drawPool = rankDoc.drawPool || [];
  const medals   = ['gold','silver','bronze'];
  const medalEmoji = ['🥇','🥈','🥉'];

  if (tab === 'current') {
    // 前三名講台
    if (top3.length) {
      parts.push('<div class="rk-section-label">保證得獎（前 3 名）</div>');
      parts.push('<div class="rk-podium">');
      top3.forEach((u, i) => {
        parts.push(`<div class="rk-podium-item ${medals[i] || ''}">
          <div class="rk-podium-medal">${medalEmoji[i] || (i+1)}</div>
          <div class="rk-podium-name">${escapeHtml(u.displayName)}</div>
          <div class="rk-podium-count">${u.monthCount} 次</div>
        </div>`);
      });
      parts.push('</div>');
    }
    // 抽獎池 4–50
    if (drawPool.length) {
      parts.push('<div class="rk-section-label" style="margin-top:12px">抽獎池（第 4–50 名）</div>');
      drawPool.forEach((u, i) => {
        const isMe = u.uid === uid;
        parts.push(`<div class="rk-list-item${isMe ? ' is-me' : ''}">
          <div class="rk-list-rank">${i + 4}</div>
          <div class="rk-list-name">${escapeHtml(u.displayName)}${isMe ? ' 👈' : ''}</div>
          <div class="rk-list-count">${u.monthCount} 次</div>
        </div>`);
      });
    }
    if (!top3.length && !drawPool.length) {
      parts.push('<div class="rk-empty">本月尚無符合資格的回報者</div>');
    }
    const calc = rankDoc.calculatedAt ? new Date(rankDoc.calculatedAt).toLocaleDateString('zh-TW') : '';
    if (calc) parts.push(`<div style="font-size:11px;color:var(--stone);text-align:center;margin-top:14px">統計時間：${calc}</div>`);

  } else {
    // 上月結果
    if (top3.length) {
      parts.push('<div class="rk-section-label">保證得獎</div>');
      parts.push('<div class="rk-podium">');
      top3.forEach((u, i) => {
        parts.push(`<div class="rk-podium-item ${medals[i] || ''}">
          <div class="rk-podium-medal">${medalEmoji[i] || (i+1)}</div>
          <div class="rk-podium-name">${escapeHtml(u.displayName)}</div>
          <div class="rk-podium-count">${u.monthCount} 次</div>
        </div>`);
      });
      parts.push('</div>');
    }
    const drawn = rankDoc.drawnWinners || [];
    parts.push('<div class="rk-winners-section">');
    parts.push('<div class="rk-section-label">隨機抽獎得獎者</div>');
    if (drawn.length) {
      drawn.forEach(w => {
        parts.push(`<span class="rk-winner-chip">🎉 ${escapeHtml(w.displayName)}</span>`);
      });
    } else {
      parts.push('<div style="font-size:13px;color:var(--stone)">抽獎尚未進行</div>');
    }
    parts.push('</div>');
  }

  return parts.join('');
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Clear All Data ─────────────────────────────────────────────────────────
let _clearTimer = null;

document.getElementById('clearDataBtn').addEventListener('click', () => {
  closeProfileDropdown();
  const el = document.getElementById('clearOverlay');
  const btn = document.getElementById('clearConfirmBtn');
  const cnt = document.getElementById('clearCountdown');
  el.classList.add('show');
  btn.disabled = true;
  btn.textContent = '確認清除';
  cnt.className = 'clear-ov-count';
  let n = 10;
  cnt.textContent = n;
  clearInterval(_clearTimer);
  _clearTimer = setInterval(() => {
    n--;
    cnt.textContent = n;
    if (n <= 0) {
      clearInterval(_clearTimer);
      btn.disabled = false;
      cnt.classList.add('ready');
    }
  }, 1000);
});

document.getElementById('clearCancelBtn').addEventListener('click', () => {
  clearInterval(_clearTimer);
  document.getElementById('clearOverlay').classList.remove('show');
});

document.getElementById('clearConfirmBtn').addEventListener('click', async () => {
  const user = auth.currentUser;
  if (!user) return;
  const btn = document.getElementById('clearConfirmBtn');
  btn.disabled = true; btn.textContent = '清除中…';
  try {
    await db.collection('users').doc(user.uid).update({
      favorites: firebase.firestore.FieldValue.delete()
    });
    await db.collection('userVisits').doc(user.uid).delete();
    favSet = new Set(); stampMap = {}; reviewMap = {};
    showFavOnly = false;
    document.getElementById('favFilterBtn').classList.remove('active');
    render();
    document.getElementById('clearOverlay').classList.remove('show');
    showStampToast('✓ 所有記憶已清除');
  } catch (e) {
    showStampToast('清除失敗：' + e.message);
    btn.disabled = false; btn.textContent = '確認清除';
  }
});

// ── onAuthStateChanged ─────────────────────────────────────────────────────
function hasPermission(userRole, requiredRole) {
  return getRoleLevel(userRole) >= (ROLE_LEVEL[requiredRole] ?? 99);
}

function showBetaGate(msg, showLogin = false) {
  document.getElementById('betaGate').style.display = 'flex';
  document.getElementById('betaGateMsg').textContent = msg;
  document.getElementById('betaLoginBtn').style.display = showLogin ? 'flex' : 'none';
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
}

document.getElementById('betaLoginBtn').addEventListener('click', () => {
  auth.signInWithPopup(provider).catch(err => {
    if (err.code === 'auth/popup-blocked') auth.signInWithRedirect(provider);
    else if (err.code !== 'auth/popup-closed-by-user') console.error(err);
  });
});

auth.onAuthStateChanged(async user => {
  try {
    if (user) {
      _googlePhotoURL = user.photoURL || '';
      loginBtn.style.display = 'none';
      userAvatar.style.display = 'block';

      const userRef    = db.collection('users').doc(user.uid);
      const counterRef = db.collection('meta').doc('counters');
      await userRef.set({
        displayName: user.displayName || '',
        email:       user.email || '',
        photoURL:    user.photoURL || '',
        lastLogin:   firebase.firestore.FieldValue.serverTimestamp(),
      }, { merge: true });

      const snap     = await userRef.get();
      const userData = snap.data();

      // 第一次登入：設定基本欄位（不依賴 meta/counters，memberNo 由 admin 手動補填）
      if (!userData.role) {
        await userRef.update({
          role: 'viewer', level: 0, postCount: 0, likeCount: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        const snap2 = await userRef.get();
        Object.assign(userData, snap2.data());
      }

      // 從 Firestore 讀取 featureFlags，決定 beta 存取門檻
      let betaPermRole = 'director'; // 預設值
      try {
        const ffSnap = await db.collection('meta').doc('featureFlags').get();
        if (ffSnap.exists && ffSnap.data().betaAccess?.perm) {
          betaPermRole = ffSnap.data().betaAccess.perm;
        }
      } catch(e) { /* Firestore rules 未允許時沿用預設值 */ }

      if (!hasPermission(userData.role, betaPermRole)) {
        showBetaGate('此頁面僅開放特定身份瀏覽');
        userAvatar.style.display = 'block';
        return;
      }

      document.getElementById('betaGate').style.display = 'none';

      // 頭像：優先用 Firestore avatarUrl，否則 Google 照片
      const avatar = getAvatarUrl(userData, user.photoURL);
      userAvatar.src       = avatar;
      pdHeaderAvatar.src   = avatar;
      pdAvatarPreview.src  = avatar;
      pdDisplayName.textContent = userData.nickname || user.displayName || '';
      pdEmail.textContent       = user.email || '';
      nicknameInput.value       = userData.nickname || '';
      adminLink.style.display   = userData.role === 'admin' ? 'flex' : 'none';
      isWarned = userData.role === 'warned';
      currentUserRole = userData.role || 'viewer';

      // 載入收藏清單 + 踩點記錄
      const favIds = userData.favorites || [];
      favSet = new Set(favIds);
      await loadStamps(user.uid);
      applyFeatureFlags();
      render();
    } else {
      loginBtn.style.display   = 'flex';
      userAvatar.style.display = 'none';
      isWarned = false;
      currentUserRole = '';
      favSet = new Set();
      stampMap = {}; reviewMap = {};
      showFavOnly = false;
      document.getElementById('favFilterBtn').classList.remove('active');
      closeProfileDropdown();
      applyFeatureFlags();
      showBetaGate('此頁面需要登入後才能瀏覽', true);
    }
  } catch (err) {
    console.error('auth state 處理失敗', err);
    loginBtn.style.display   = 'flex';
    userAvatar.style.display = 'none';
  }
});

// ── Login ──────────────────────────────────────────────────────────────────
loginBtn.addEventListener('click', () => {
  auth.signInWithPopup(provider).catch(err => {
    if (err.code === 'auth/popup-blocked') {
      auth.signInWithRedirect(provider).catch(e => console.error('redirect 登入失敗', e));
    } else if (err.code !== 'auth/popup-closed-by-user') {
      console.error('登入失敗', err);
    }
  });
});
auth.getRedirectResult().catch(err => {
  if (err.code && err.code !== 'auth/no-auth-event') {
    console.error('redirect 登入失敗', err);
    auth.signOut();
  }
});

// ── Init ───────────────────────────────────────────────────────────────────
loadData();

// ── PWA Service Worker ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── PWA 模式下隱藏「回首頁」（standalone 裡導離會跳出 App）─────────────────
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
  const homeLink = document.querySelector('.drawer a[href="index.html"]');
  if (homeLink) homeLink.style.display = 'none';
}
