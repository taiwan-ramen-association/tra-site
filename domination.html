<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/icons/03.png">
<title>制霸地圖 ─ 台灣拉麵協會</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C8272D; --red-dark: #9b1e23;
  --ink: #1a1209; --paper: #faf7f2;
  --stone: #8a7d6e; --line: #e8e0d4; --white: #ffffff;
}
body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

header {
  background: var(--red); color: var(--white);
  padding: 13px 20px; display: flex; align-items: center;
  justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
header a { color: var(--white); font-size: 13px; text-decoration: none; opacity: 0.85; }
header a:hover { opacity: 1; }

/* Gate */
#gate {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 70vh; gap: 14px;
}
#gate p { color: var(--stone); font-size: 14px; }
.btn-google {
  display: flex; align-items: center; gap: 8px;
  background: var(--white); border: 1px solid var(--line);
  padding: 10px 20px; border-radius: 8px;
  font-size: 14px; cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.btn-google:hover { background: #f5f5f5; }

/* App */
#app { display: none; max-width: 900px; margin: 0 auto; padding: 16px; }

/* Stats bar */
.stats-bar {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}
.stat-card {
  flex: 1; min-width: 120px;
  background: var(--white); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px; text-align: center;
}
.stat-card .val {
  font-size: 24px; font-weight: 800; color: var(--red); line-height: 1;
}
.stat-card .lbl { font-size: 11px; color: var(--stone); margin-top: 4px; }

/* Map */
#mapWrap {
  background: var(--white); border: 1px solid var(--line);
  border-radius: 14px; overflow: hidden; margin-bottom: 14px;
  position: relative;
}
#mapSvg { width: 100%; height: auto; display: block; }
.town-path { stroke: #fff; stroke-width: 0.4; cursor: pointer; transition: opacity 0.1s; }
.town-path:hover { opacity: 0.75; stroke: #333; stroke-width: 1; }

/* Tooltip */
#tooltip {
  position: fixed; pointer-events: none; z-index: 500;
  background: rgba(20,10,5,0.88); color: #fff;
  padding: 8px 12px; border-radius: 9px; font-size: 12px;
  line-height: 1.6; max-width: 200px; display: none;
}
#tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
#tooltip .tt-score { color: #ffc; }

/* Legend */
.legend {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--white);
  border: 1px solid var(--line); border-radius: 12px;
  font-size: 12px; color: var(--stone); flex-wrap: wrap;
}
.legend-title { font-weight: 600; color: var(--ink); margin-right: 4px; }
.legend-grad {
  flex: 1; min-width: 120px; height: 12px; border-radius: 6px;
  background: linear-gradient(to right, #ffeeee, #7b1010);
}
.legend-labels { display: flex; justify-content: space-between; font-size: 10px; width: 100%; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

#loadingMsg { text-align: center; padding: 60px; color: var(--stone); font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>🗾 拉麵制霸地圖</h1>
  <a href="finder.html">← 回搜尋器</a>
</header>

<div id="gate">
  <p id="gateMsg">驗證中…</p>
  <button class="btn-google" id="loginBtn" style="display:none">
    <svg viewBox="0 0 48 48" width="18" height="18"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.4 30.2 0 24 0 14.7 0 6.8 5.4 3 13.3l7.8 6C12.7 13.2 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 6.9-10.1 6.9-17z"/><path fill="#FBBC05" d="M10.8 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.7-4.7L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.4 10.6l8.4-5.9z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-3.7-13.2-9l-7.8 6C6.8 42.6 14.7 48 24 48z"/></svg>
    以 Google 帳號登入
  </button>
</div>

<div id="app">
  <div id="loadingMsg">載入中…</div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-card"><div class="val" id="statScore">0</div><div class="lbl">制霸總分</div></div>
    <div class="stat-card"><div class="val" id="statShops">0</div><div class="lbl">已踩點店家</div></div>
    <div class="stat-card"><div class="val" id="statTowns">0</div><div class="lbl">已涉足鄉鎮</div></div>
    <div class="stat-card"><div class="val" id="statFull">0</div><div class="lbl">完全制霸</div></div>
  </div>

  <div id="mapWrap" style="display:none">
    <svg id="mapSvg" viewBox="0 0 600 700"></svg>
  </div>

  <div class="legend" id="legendBox" style="display:none">
    <span class="legend-title">制霸率</span>
    <div style="flex:1;min-width:140px">
      <div class="legend-grad"></div>
      <div class="legend-labels"><span>0%</span><span>50%</span><span>100%</span></div>
    </div>
    <div class="legend-item"><div class="legend-swatch" style="background:#cccccc"></div>無拉麵店</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fff0f0;border:1px solid #ddd"></div>未踩點</div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div id="ttShops"></div>
  <div class="tt-score" id="ttScore"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdN0AYZMM2AU66QcH4BVNJHx1plwQBBYc",
  authDomain: "taiwan-ramen-association.firebaseapp.com",
  projectId: "taiwan-ramen-association",
  storageBucket: "taiwan-ramen-association.firebasestorage.app",
  messagingSenderId: "66234065738",
  appId: "1:66234065738:web:eb9fc4348a942da66ad7b3"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db   = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

const norm = s => (s || '').replace(/台/g, '臺').trim();


// ===== ✅ 新：狀態 → 分數（不顯示）=====
function scoreFromStatus(status) {
  if (!status) return 0;
  if (status === 0.2) return 0.2;
  if (status === 1) return 1;
  if (status >= 2 && status <= 10) return status;
  if (status > 10 && status < 20) return 10;
  if (status === 20) return 20;
  return 0;
}


// ===== ✅ 新：Firestore 更新（支援心得）=====
async function updateVisit(uid, shopId, status, note = '') {
  const ref = db.collection('userVisits').doc(uid);

  await ref.set({
    visits: {
      [shopId]: {
        status,
        note: note.substring(0, 200), // 限制字數
        updatedAt: new Date()
      }
    }
  }, { merge: true });
}


// ===== 登入 =====
document.getElementById('loginBtn').addEventListener('click', () => {
  auth.signInWithPopup(provider).catch(err => {
    if (err.code === 'auth/popup-blocked') auth.signInWithRedirect(provider);
    else if (err.code !== 'auth/popup-closed-by-user') console.error(err);
  });
});


auth.onAuthStateChanged(async user => {
  const gate = document.getElementById('gate');
  const app  = document.getElementById('app');

  if (!user) {
    document.getElementById('gateMsg').textContent = '請登入後查看制霸地圖';
    document.getElementById('loginBtn').style.display = 'flex';
    gate.style.display = 'flex';
    app.style.display  = 'none';
    return;
  }

  gate.style.display = 'none';
  app.style.display  = 'block';
  await loadAll(user.uid);
});


// ===== 主載入 =====
async function loadAll(uid) {
  try {
    const [shopsRes, visitsSnap, geoRes] = await Promise.all([
      fetch('data/data.json').then(r => r.json()),
      db.collection('userVisits').doc(uid).get(),
      fetch('https://cdn.jsdelivr.net/gh/g0v/twgeojson@master/json/twTown1982.geo.json').then(r => r.json()),
    ]);

    const visits = visitsSnap.exists ? (visitsSnap.data().visits || {}) : {};

    // ===== 建立鄉鎮 index（只計營業中店家）=====
    const activeShopIds = new Set();
    const shopsByTown = {};
    for (const shop of shopsRes) {
      if (shop['營業狀態'] !== '營業中') continue;
      activeShopIds.add(shop['ID']);
      const key = norm(shop['縣市']) + '_' + norm(shop['鄉鎮市區']);
      if (!shopsByTown[key]) shopsByTown[key] = [];
      shopsByTown[key].push(shop['ID']);
    }
    const totalTownsWithShops = Object.keys(shopsByTown).length;

    // ===== 鄉鎮統計 =====
    function townStats(key) {
      const ids = shopsByTown[key] || [];
      let score = 0;
      let visitedCount = 0; // 吃過一次以上（含從業）的店數

      for (const id of ids) {
        const s = visits[id];
        if (s != null && s > 0) {
          if (s >= 1 || s === 20) visitedCount++;
          if (s === 20) continue; // 從業不計入累積分數
          score += scoreFromStatus(s);
        }
      }

      return {
        count: ids.length,
        score,
        max: ids.length * 10,
        hasVisit: visitedCount > 0,
        visitedCount
      };
    }


    // ===== 全域統計（只算營業中店家）=====
    let totalScore = 0, stampedShops = 0;

    for (const [shopId, s] of Object.entries(visits)) {
      if (!activeShopIds.has(shopId)) continue;
      totalScore += scoreFromStatus(s);
      if (s >= 1 || s === 20) stampedShops++;
    }

    document.getElementById('statScore').textContent = Math.round(totalScore * 10) / 10;
    document.getElementById('statShops').textContent = stampedShops;


    // ===== 畫地圖 =====
    renderMap(geoRes, shopsByTown, visits, townStats, stats => {
      document.getElementById('statTowns').textContent = stats.visitedTowns;
      document.getElementById('statFull').textContent  = stats.fullTowns + '/' + totalTownsWithShops;
    });

    document.getElementById('loadingMsg').style.display  = 'none';
    document.getElementById('statsBar').style.display    = 'flex';
    document.getElementById('mapWrap').style.display     = 'block';
    document.getElementById('legendBox').style.display   = 'flex';

  } catch (e) {
    document.getElementById('loadingMsg').textContent = '地圖載入失敗：' + e.message;
    console.error(e);
  }
}


// ===== 顏色 =====
function getFill(count, score, max) {
  if (count === 0) return '#cccccc';
  if (score === 0) return '#fff0f0';

  const ratio = score / max;
  return d3.interpolateRgb('#ffcccc', '#7b1010')(ratio);
}


// ===== 地圖渲染 =====
function renderMap(geo, shopsByTown, visits, townStats, cb) {
  const svg = d3.select('#mapSvg');
  const W = 600, H = 700;

  const projection = d3.geoMercator()
    .center([121, 23.6])
    .scale(W * 11.5)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(projection);
  const tip  = document.getElementById('tooltip');

  let visitedTowns = 0, fullTowns = 0;

  svg.selectAll('.town-path')
    .data(geo.features)
    .join('path')
    .attr('class', 'town-path')
    .attr('d', path)
    .attr('fill', d => {
      const key = norm(d.properties.COUNTYNAME) + '_' + norm(d.properties.TOWNNAME);
      const { count, score, max, hasVisit, visitedCount } = townStats(key);

      if (count > 0 && hasVisit) visitedTowns++;
      if (count > 0 && visitedCount === count) fullTowns++;

      return getFill(count, score, max);
    })
    .on('mousemove', function(event, d) {
      const key = norm(d.properties.COUNTYNAME) + '_' + norm(d.properties.TOWNNAME);
      const { count, score, max, visitedCount } = townStats(key);
      const pct = count > 0 ? Math.round(visitedCount / count * 100) : 0;

      document.getElementById('ttName').textContent =
        d.properties.COUNTYNAME + ' ' + d.properties.TOWNNAME;

      document.getElementById('ttShops').textContent =
        count > 0 ? `拉麵店 ${count} 間` : '本區無拉麵店資料';

      // ✅ 不顯示分數
      document.getElementById('ttScore').textContent =
        count > 0 ? `踩點完成度 ${pct}%` : '';

      tip.style.display = 'block';
      tip.style.left = (event.clientX + 14) + 'px';
      tip.style.top  = (event.clientY - 10) + 'px';
    })
    .on('mouseleave', () => { tip.style.display = 'none'; });

  cb({ visitedTowns, fullTowns });
}
</script>
</body>
</html>
