name: Sync Google Sheets ↔ data.json

on:
  schedule:
    # - cron: '0 */6 * * *'   # 每6小時自動同步一次
    - cron: '0 2 1 * *'     # 每月1日 02:00 更新行政區劃清單
  push:
    paths:
      - 'data.json'          # 當 data.json 被手動推上來時，反向更新 Google Sheets
  workflow_dispatch:          # 可手動觸發

jobs:

  # ── JOB 1：Google Sheets → data.json ──────────────────────────────────────
  sheets_to_json:
    name: Sheets → JSON
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install gspread google-auth requests

      - name: Fetch sheet and save data.json
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          python3 << 'EOF'
          import json, os, re, gspread
          from google.oauth2.service_account import Credentials

          key = json.loads(os.environ['SERVICE_ACCOUNT_KEY'])
          creds = Credentials.from_service_account_info(key, scopes=[
              'https://www.googleapis.com/auth/spreadsheets.readonly'
          ])
          gc = gspread.authorize(creds)

          SPREADSHEET_ID = '1kS00wVDgdg11ejcC85Y4_utJ4jaywgUpb-KrhFIp8Mo'
          sh = gc.open_by_key(SPREADSHEET_ID)
          ws = sh.worksheet('總表csv')

          rows = ws.get_all_records(default_blank='')
          rows = [r for r in rows if str(r.get('店名','')).strip()]

          # 處理 Date(yyyy,m,d) 格式 → yyyy年m+1月d日
          def fix_date(val):
              if not isinstance(val, str):
                  return val
              m = re.match(r'Date\((\d+),(\d+),(\d+)\)', val.strip())
              if m:
                  y, mo, d = int(m.group(1)), int(m.group(2))+1, int(m.group(3))
                  return f'{y}年{mo}月{d}日'
              return val

          for row in rows:
              for k in ('開幕日', '歇業日'):
                  if k in row:
                      row[k] = fix_date(row[k])

          # 自動從地址解析縣市與鄉鎮市區（比對內政部官方清單）
          try:
              with open('tools/districts.json', 'r', encoding='utf-8') as f:
                  _districts = json.load(f)
          except FileNotFoundError:
              _districts = {}

          def parse_city_district(addr):
              if not addr or not _districts:
                  return '', ''
              addr_n = addr.replace('台', '臺')
              for county, towns in _districts.items():
                  if addr_n.startswith(county):
                      rest = addr_n[len(county):]
                      for town in towns:
                          if rest.startswith(town):
                              return county, town
              return '', ''

          for row in rows:
              if not str(row.get('縣市','')).strip() or not str(row.get('鄉鎮市區','')).strip():
                  city, dist = parse_city_district(str(row.get('地址','')))
                  if not str(row.get('縣市','')).strip():
                      row['縣市'] = city
                  if not str(row.get('鄉鎮市區','')).strip():
                      row['鄉鎮市區'] = dist

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(rows, f, ensure_ascii=False, indent=2)

          print(f'Done: {len(rows)} rows saved to data.json')
          EOF

      - name: Geocode missing lat/lng
        run: |
          python3 << 'EOF'
          import json, time, requests, re

          with open('data.json', 'r', encoding='utf-8') as f:
              rows = json.load(f)

          to_geocode = [r for r in rows if not r.get('lat') or not r.get('lng')]
          if not to_geocode:
              print('No new geocoding needed')
              exit(0)

          print(f'Geocoding {len(to_geocode)} shops...')
          HEADERS = {'User-Agent': 'ramen-finder/1.0'}
          updated = 0

          def coords_from_map_url(url):
              if not url or not url.startswith('http'):
                  return None, None
              try:
                  r = requests.get(url, headers=HEADERS, timeout=10, allow_redirects=True)
                  final = r.url
                  m = re.search(r'/@(-?\d+\.\d+),(-?\d+\.\d+)', final)
                  if m:
                      return float(m.group(1)), float(m.group(2))
                  m = re.search(r'[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)', final)
                  if m:
                      return float(m.group(1)), float(m.group(2))
              except Exception:
                  pass
              return None, None

          def geocode_nominatim(address):
              try:
                  r = requests.get('https://nominatim.openstreetmap.org/search',
                      params={'q': address, 'format': 'json', 'limit': 1, 'countrycodes': 'tw'},
                      headers=HEADERS, timeout=10)
                  results = r.json()
                  if results:
                      return float(results[0]['lat']), float(results[0]['lon'])
              except Exception:
                  pass
              return None, None

          for row in to_geocode:
              name    = row.get('店名', '')
              address = row.get('地址', '') or name
              map_url = row.get('Map', '')

              lat, lng = coords_from_map_url(map_url)
              if not lat:
                  time.sleep(1.1)
                  lat, lng = geocode_nominatim(address)

              if lat:
                  row['lat'] = lat
                  row['lng'] = lng
                  updated += 1
                  print(f"  ✓ {name}: {lat:.5f}, {lng:.5f}")
              else:
                  print(f"  ✗ {name}: not found")
              time.sleep(1.1)

          if updated:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(rows, f, ensure_ascii=False, indent=2)
          print(f'Updated {updated} coordinates')
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto-sync from Google Sheets $(date '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: Backup data.json to backups branch
        run: |
          DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d')
          CUTOFF=$(TZ='Asia/Taipei' date -d '30 days ago' '+%Y-%m-%d')
          BACKUP_FILE="data_${DATE}.json"

          git fetch origin backups 2>/dev/null || true

          if git ls-remote --exit-code origin backups > /dev/null 2>&1; then
            git worktree add /tmp/backups backups
          else
            git worktree add --orphan -b backups /tmp/backups
          fi

          # 複製今日備份
          cp data.json "/tmp/backups/${BACKUP_FILE}"

          cd /tmp/backups

          # 清除 30 天前的舊備份
          for f in data_*.json; do
            file_date="${f#data_}"
            file_date="${file_date%.json}"
            if [[ "$file_date" < "$CUTOFF" ]]; then
              git rm "$f" && echo "Removed old backup: $f"
            fi
          done

          git add "${BACKUP_FILE}"
          git diff --cached --quiet \
            && echo "Backup ${DATE} already exists, skipping" \
            || git commit -m "Backup ${DATE} (pruned files older than ${CUTOFF})"
          git push origin backups

  # ── JOB 2：data.json → Google Sheets ──────────────────────────────────────
  json_to_sheets:
    name: JSON → Sheets
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install gspread
        run: pip install gspread google-auth

      - name: Push data.json back to Google Sheets
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          python3 << 'EOF'
          import json, os, gspread
          from google.oauth2.service_account import Credentials

          key = json.loads(os.environ['SERVICE_ACCOUNT_KEY'])
          creds = Credentials.from_service_account_info(key, scopes=[
              'https://www.googleapis.com/auth/spreadsheets'
          ])
          gc = gspread.authorize(creds)

          SPREADSHEET_ID = '1kS00wVDgdg11ejcC85Y4_utJ4jaywgUpb-KrhFIp8Mo'
          sh = gc.open_by_key(SPREADSHEET_ID)
          ws = sh.worksheet('總表csv')

          with open('data.json', 'r', encoding='utf-8') as f:
              rows = json.load(f)

          if not rows:
              print('data.json is empty, skipping')
              exit(0)

          # 固定欄位順序（lat/lng 放最後，供地圖功能使用）
          HEADERS = [
              '店名','地址','Map','類型','派系','醬底',
              '營業日','營業時段','店休日','排隊方式','點餐方式','支付方式',
              '吧台數','桌位數','洗手間','營業備註','其他',
              '開幕日','歇業日','營業狀態',
              'Facebook','Instagram','縣市','鄉鎮市區','開幕月份',
              'lat','lng'
          ]

          values = [HEADERS]
          for row in rows:
              values.append([str(row.get(h, '')) for h in HEADERS])

          ws.clear()
          ws.update('A1', values)

          print(f'Done: {len(rows)} rows written back to Google Sheets')
          EOF

  # ── JOB 3：每月更新行政區劃清單 ───────────────────────────────────────────────
  update_districts:
    name: 更新行政區劃清單
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 1 * *'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install requests
        run: pip install requests

      - name: Fetch districts from NLSC API
        run: |
          python3 << 'EOF'
          import json, warnings, xml.etree.ElementTree as ET
          import requests
          warnings.filterwarnings('ignore')

          API = 'https://api.nlsc.gov.tw/other'

          # 縣市清單
          r = requests.get(f'{API}/ListCounty', timeout=10, verify=False)
          root = ET.fromstring(r.content)
          county_names = {
              item.findtext('countycode'): item.findtext('countyname')
              for item in root.findall('countyItem')
          }

          # 各縣市鄉鎮市區
          result = {}
          for code, name in county_names.items():
              r = requests.get(f'{API}/ListTown1/{code}', timeout=10, verify=False)
              root = ET.fromstring(r.content)
              towns = [item.findtext('townname') for item in root.findall('townItem')]
              if towns:
                  result[name] = towns

          with open('tools/districts.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          total = sum(len(v) for v in result.values())
          print(f'Done: {len(result)} 縣市，{total} 鄉鎮市區')
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/districts.json
          git diff --cached --quiet \
            && echo "No changes to districts.json" \
            || git commit -m "更新行政區劃清單 $(date '+%Y-%m')" && git push
