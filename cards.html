<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/icons/03.png">
  <title>聊天卡牌 | 台灣拉麵協會</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    :root {
      --c0: #F5E4A8;   /* 😊 warm yellow */
      --c0-dark: #C8A800;
      --c1: #B8D8F0;   /* ⭐ sky blue */
      --c1-dark: #4A90C4;
      --c2: #F5C4A0;   /* ⭐⭐ orange */
      --c2-dark: #D4690A;
      --c3: #E8A0A0;   /* ⭐⭐⭐ red */
      --c3-dark: #C8272D;
      --card-w: 340px;
      --card-h: 500px;
    }

    body { background: var(--paper); min-height: 100vh; }

    /* ── PAGE LAYOUT ── */
    .page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px 60px;
      gap: 32px;
    }

    /* ── HEADER ── */
    .deck-header {
      text-align: center;
    }
    .deck-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--ink);
    }
    .deck-sub {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── MODE SELECTOR ── */
    .mode-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mode-btn {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      padding: 7px 16px;
      border: 1.5px solid var(--line);
      background: var(--white);
      color: var(--muted);
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
    }
    .mode-btn:hover { border-color: var(--ink); color: var(--ink); }
    .mode-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

    .level-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .level-btn {
      font-size: 12px;
      letter-spacing: 1px;
      padding: 6px 14px;
      border: 1.5px solid var(--line);
      background: var(--white);
      color: var(--muted);
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
    }
    .level-btn[data-level="0"].active { background: var(--c0); border-color: var(--c0-dark); color: #7A6000; }
    .level-btn[data-level="1"].active { background: var(--c1); border-color: var(--c1-dark); color: #1A4A70; }
    .level-btn[data-level="2"].active { background: var(--c2); border-color: var(--c2-dark); color: #7A3000; }
    .level-btn[data-level="3"].active { background: var(--c3); border-color: var(--c3-dark); color: #6A0000; }

    /* ── PROGRESS ── */
    .progress-info {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
      text-align: center;
    }
    .progress-bar-wrap {
      width: var(--card-w);
      height: 3px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--ink);
      transition: width .4s ease;
      border-radius: 2px;
    }

    /* ── CARD SCENE ── */
    .card-scene {
      width: var(--card-w);
      height: var(--card-h);
      perspective: 1000px;
      cursor: pointer;
      position: relative;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .card-scene.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.08);
    }

    /* ── CARD BACK ── */
    .card-back {
      background: var(--ink);
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .card-back-pattern {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      overflow: hidden;
      opacity: .06;
      background-image: repeating-linear-gradient(
        45deg,
        var(--white) 0px,
        var(--white) 1px,
        transparent 1px,
        transparent 12px
      ),
      repeating-linear-gradient(
        -45deg,
        var(--white) 0px,
        var(--white) 1px,
        transparent 1px,
        transparent 12px
      );
    }
    .card-back-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 5px;
      color: var(--white);
      text-align: center;
      line-height: 1.8;
      z-index: 1;
    }
    .card-back-hint {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(255,255,255,.45);
      z-index: 1;
    }
    .tap-icon {
      font-size: 28px;
      z-index: 1;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* ── CARD FRONT ── */
    .card-front {
      transform: rotateY(180deg);
      padding: 32px 28px;
      justify-content: space-between;
    }
    .card-front.level-0 { background: var(--c0); }
    .card-front.level-1 { background: var(--c1); }
    .card-front.level-2 { background: var(--c2); }
    .card-front.level-3 { background: var(--c3); }

    .card-level-tag {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .level-icon { font-size: 20px; line-height: 1; }
    .level-label {
      font-size: 10px;
      letter-spacing: 3px;
      font-weight: 500;
      opacity: .65;
    }
    .card-number {
      font-size: 10px;
      letter-spacing: 2px;
      opacity: .5;
    }

    .card-question-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0;
    }
    .card-question {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.9;
      text-align: center;
      color: rgba(0,0,0,.78);
    }

    .card-footer-hint {
      font-size: 10px;
      letter-spacing: 2px;
      text-align: center;
      opacity: .45;
    }

    /* ── ACTION BUTTONS ── */
    .card-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn-draw {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      padding: 14px 36px;
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn-draw:hover { opacity: .82; }
    .btn-draw:active { transform: scale(.97); }
    .btn-draw:disabled { opacity: .3; cursor: not-allowed; }

    .btn-skip {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      padding: 14px 20px;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--line);
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-skip:hover { border-color: var(--muted); color: var(--ink); }
    .btn-skip:disabled { opacity: .3; cursor: not-allowed; }

    .btn-reset {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color .2s;
    }
    .btn-reset:hover { color: var(--ink); }

    /* ── DONE STATE ── */
    .done-msg {
      display: none;
      text-align: center;
      flex-direction: column;
      gap: 12px;
    }
    .done-msg.show { display: flex; }
    .done-emoji { font-size: 40px; }
    .done-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--ink);
    }
    .done-sub {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    /* ── RULES TOGGLE ── */
    .rules-toggle {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .rules-panel {
      display: none;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px 28px;
      width: var(--card-w);
      font-size: 13px;
      line-height: 2;
      color: var(--ink);
    }
    .rules-panel.show { display: block; }
    .rules-panel h3 {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }
    .rules-panel ul { padding-left: 16px; }
    .rules-panel li { margin-bottom: 4px; font-size: 12px; letter-spacing: 1px; color: var(--muted); }

    /* ── MOBILE ── */
    @media (max-width: 400px) {
      :root {
        --card-w: 300px;
        --card-h: 440px;
      }
      .card-question { font-size: 19px; }
    }
  </style>
</head>

      <li>一般局：開到 ⭐⭐</li>

  { id: 80, level: 2, q: '最近你的能量是上升還是下降' },

  // ⭐⭐⭐ Level 3 — Deep (20)
  { id: 81,  level: 3, q: '想刪除的一段記憶' },
  { id: 82,  level: 3, q: '一個仍影響你的選擇' },
  { id: 83,  level: 3, q: '現在人生是選擇還是被推動' },
  { id: 84,  level: 3, q: '現在人生在哪個階段' },
  { id: 85,  level: 3, q: '改變你世界觀的一件事' },
  { id: 86,  level: 3, q: '價值觀有沒有改變' },
  { id: 87,  level: 3, q: '五年後怎麼看現在' },
  { id: 88,  level: 3, q: '希望未來記得現在什麼' },
  { id: 89,  level: 3, q: '曾經很確定但現在動搖的信念' },
  { id: 90,  level: 3, q: '一段讓你重新定義重要的經歷' },
  { id: 91,  level: 3, q: '現在是在累積還是轉向' },
  { id: 92,  level: 3, q: '有沒有一個角色你想放下' },
  { id: 93,  level: 3, q: '最不想回到哪個狀態' },
  { id: 94,  level: 3, q: '有沒有一段關係仍影響你' },
  { id: 95,  level: 3, q: '如果重新來一次會怎麼選' },
  { id: 96,  level: 3, q: '有沒有一個你還沒完成的課題' },
  { id: 97,  level: 3, q: '現在的人生更接近誰的期待' },
  { id: 98,  level: 3, q: '你正在成為誰' },
  { id: 99,  level: 3, q: '如果人生有標題會是什麼' },
  { id: 100, level: 3, q: '這一階段你最想留下什麼' },
];

const LEVEL_META = [
  { icon: '😊', label: '暖身',  cls: 'level-0' },
  { icon: '⭐',  label: '生活',  cls: 'level-1' },
  { icon: '⭐⭐', label: '情緒', cls: 'level-2' },
  { icon: '⭐⭐⭐', label: '深度', cls: 'level-3' },
];

// ── STATE ──────────────────────────────────────────────────
let mode = 'random';           // 'random' | 'sequential'
let activelevels = new Set([0,1,2,3]);
let deck = [];                 // remaining cards
let currentCard = null;
let isFlipped = false;
let totalInDeck = 0;

// ── DOM REFS ───────────────────────────────────────────────
const cardScene   = document.getElementById('cardScene');
const cardFront   = document.getElementById('cardFront');
const cardQ       = document.getElementById('cardQuestion');
const cardLvIco   = document.getElementById('cardLevelIcon');
const cardLvLbl   = document.getElementById('cardLevelLabel');
const cardNum     = document.getElementById('cardNumber');
const btnDraw     = document.getElementById('btnDraw');
const btnSkip     = document.getElementById('btnSkip');
const btnReset    = document.getElementById('btnReset');
const remaining   = document.getElementById('remaining');
const progressFill= document.getElementById('progressFill');
const doneMsg     = document.getElementById('doneMsg');
const cardActions = document.getElementById('cardActions');
const rulesToggle = document.getElementById('rulesToggle');
const rulesPanel  = document.getElementById('rulesPanel');

// ── HELPERS ────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildDeck() {
  const filtered = CARDS.filter(c => activelevels.has(c.level));
  if (mode === 'random') {
    deck = shuffle([...filtered]);
  } else {
    // sequential: sort by level then shuffle within each level
    deck = [];
    for (let l = 0; l < 4; l++) {
      const lvCards = filtered.filter(c => c.level === l);
      deck.push(...shuffle(lvCards));
    }
  }
  totalInDeck = deck.length;
  updateProgress();
}

function updateProgress() {
  const left = deck.length;
  const used = totalInDeck - left;
  remaining.textContent = left;
  progressFill.style.width = totalInDeck ? `${(used / totalInDeck) * 100}%` : '0%';
}

function setCardContent(card) {
  const meta = LEVEL_META[card.level];
  cardQ.textContent = card.q;
  cardLvIco.textContent = meta.icon;
  cardLvLbl.textContent = meta.label;
  cardNum.textContent = `#${card.id}`;
  // update color
  cardFront.className = `card-face card-front ${meta.cls}`;
}

function flipToBack() {
  cardScene.classList.remove('flipped');
  isFlipped = false;
}

function flipToFront() {
  cardScene.classList.add('flipped');
  isFlipped = true;
}

function showDone() {
  doneMsg.classList.add('show');
  cardActions.style.display = 'none';
  cardScene.style.display = 'none';
}

function hideDone() {
  doneMsg.classList.remove('show');
  cardActions.style.display = '';
  cardScene.style.display = '';
}

function drawCard() {
  if (deck.length === 0) {
    showDone();
    return;
  }
  currentCard = deck.shift();
  setCardContent(currentCard);
  updateProgress();

  // animate: flip back → wait → flip front
  flipToBack();
  setTimeout(() => {
    flipToFront();
    btnSkip.disabled = false;
  }, 60);
}

// ── INIT ───────────────────────────────────────────────────
function init() {
  hideDone();
  buildDeck();
  flipToBack();
  btnSkip.disabled = true;
  // reset card to default back state
}

// ── EVENTS ────────────────────────────────────────────────
cardScene.addEventListener('click', () => {
  if (isFlipped) {
    // flip back (peek at back)
    flipToBack();
    btnSkip.disabled = false;
  } else {
    if (currentCard) flipToFront();
  }
});

btnDraw.addEventListener('click', drawCard);

btnSkip.addEventListener('click', () => {
  // Put current card aside, draw next
  flipToBack();
  btnSkip.disabled = true;
  setTimeout(drawCard, 320);
});

btnReset.addEventListener('click', () => {
  init();
});

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    init();
  });
});

// Level filter buttons
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lv = parseInt(btn.dataset.level);
    if (activelevels.has(lv)) {
      // don't allow deselecting all
      if (activelevels.size === 1) return;
      activelevels.delete(lv);
      btn.classList.remove('active');
    } else {
      activelevels.add(lv);
      btn.classList.add('active');
    }
    init();
  });
});

// Rules toggle
rulesToggle.addEventListener('click', () => {
  rulesPanel.classList.toggle('show');
  rulesToggle.textContent = rulesPanel.classList.contains('show') ? '收起說明' : '玩法說明';
});

// ── START ──────────────────────────────────────────────────
init();
</script>
