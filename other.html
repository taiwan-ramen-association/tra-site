<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/icons/03.png">
  <title>其他 | 台灣拉麵協會</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .other-hero {
      padding: 80px 10vw 48px;
      border-bottom: 1px solid var(--line);
    }
    .other-eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .other-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--ink);
    }

    .other-grid {
      padding: 64px 10vw 100px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .other-card {
      display: block;
      text-decoration: none;
      border: 1.5px solid var(--line);
      border-radius: 4px;
      padding: 32px 28px;
      background: var(--white);
      transition: border-color .2s, box-shadow .2s, transform .2s;
      position: relative;
      overflow: hidden;
    }
    .other-card:hover {
      border-color: var(--ink);
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }
    .other-card-tag {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .other-card-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .other-card-desc {
      font-size: 13px;
      line-height: 2;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .other-card-arrow {
      position: absolute;
      bottom: 28px;
      right: 28px;
      font-size: 18px;
      color: var(--line);
      transition: color .2s, transform .2s;
    }
    .other-card:hover .other-card-arrow {
      color: var(--ink);
      transform: translate(3px, -3px);
    }

    .other-card-accent {
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--ink);
      opacity: 0;
      transition: opacity .2s;
    }
    .other-card:hover .other-card-accent { opacity: 1; }

    @media (max-width: 600px) {
      .other-hero { padding: 72px 24px 40px; }
      .other-grid { padding: 40px 24px 80px; }
      .other-title { font-size: 24px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">台灣拉麵協會 <span>|</span> TRA</a>
  <a class="nav-back" href="index.html">← 返回首頁</a>
</nav>

<div class="other-hero">
  <div class="other-eyebrow">OTHER</div>
  <div class="other-title">其他</div>
</div>

<div class="other-grid">

  <!-- 聊天卡牌 -->
  <a class="other-card" href="cards.html" target="_blank" rel="noopener">
    <div class="other-card-accent"></div>
    <div class="other-card-tag">INTERACTIVE · GAME</div>
    <div class="other-card-title">聊天卡牌</div>
    <div class="other-card-desc">
      破冰對話卡牌遊戲。<br>
      四種難度、100 張題目，<br>
      適合 2–5 人聚會使用。
    </div>
    <div class="other-card-arrow">↗</div>
  </a>

</div>

</body>
</html>
