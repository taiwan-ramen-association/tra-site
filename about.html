<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/icons/03.png">
  <meta name="google-adsense-account" content="ca-pub-6476285123291834">
  <title>關於協會 | 台灣拉麵協會</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6476285123291834" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    main { max-width: 860px; margin: 0 auto; padding: 80px 24px 120px; }
    .page-title { font-family: 'Noto Serif TC', serif; font-size: clamp(28px, 4vw, 44px); font-weight: 900; letter-spacing: 0.06em; margin-bottom: 72px; }

    .section { margin-bottom: 72px; padding-bottom: 72px; border-bottom: 1px solid var(--line); }
    .section:last-of-type { border-bottom: none; }
    .section-num { font-size: 10px; letter-spacing: 4px; color: var(--red); margin-bottom: 12px; }
    .section-title { font-family: 'Noto Serif TC', serif; font-size: clamp(20px, 2.5vw, 28px); font-weight: 900; letter-spacing: 0.06em; margin-bottom: 28px; }
    .section p { font-size: 14px; line-height: 2.2; color: var(--muted); margin-bottom: 16px; }
    .section p:last-child { margin-bottom: 0; }

    .contact-section { background: var(--ink); color: var(--white); padding: 56px; margin-top: 72px; }
    .contact-section .section-num { color: rgba(200,39,45,0.8); }
    .contact-section .section-title { color: var(--white); margin-bottom: 36px; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .contact-item { margin-bottom: 20px; }
    .contact-label { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .contact-value { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.6; }
    .contact-value a { color: rgba(255,255,255,0.85); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.2); transition: border-color 0.2s; }
    .contact-value a:hover { border-color: var(--red); color: var(--white); }
    .social-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .social-list li a { font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: none; display: flex; align-items: center; gap: 10px; transition: color 0.2s; }
    .social-list li a:hover { color: var(--white); }
    .social-tag { font-size: 9px; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.2); padding: 2px 8px; }

    .charter-link {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 12px; letter-spacing: 3px; color: var(--ink);
      text-decoration: none; border-bottom: 1px solid var(--ink);
      padding-bottom: 4px; margin-top: 40px; transition: color 0.2s, border-color 0.2s;
    }
    .charter-link:hover { color: var(--red); border-color: var(--red); }

    @media (max-width: 600px) {
      main { padding: 60px 20px 80px; }
      .contact-section { padding: 40px 24px; }
      .contact-grid { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">台灣<span>拉麵</span>協會</a>
    <a href="index.html" class="nav-back">← 返回首頁</a>
  </nav>

  <main>
    <p class="page-label">ABOUT</p>
    <h1 class="page-title">關於協會</h1>
    <div id="sections"></div>
    <a href="charter.html" class="charter-link">查看協會章程 →</a>
  </main>

  <div class="contact-section" id="contact-block" style="max-width:860px;margin:0 auto;display:none;">
    <p class="section-num">CONTACT</p>
    <h2 class="contact-section section-title" style="font-family:'Noto Serif TC',serif;font-size:clamp(20px,2.5vw,28px);font-weight:900;letter-spacing:0.06em;color:white;margin-bottom:36px;">聯絡我們</h2>
    <div class="contact-grid" id="contact-grid"></div>
  </div>

  <script>
    fetch('data/about.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('sections');
        const nums = ['一', '二', '三', '四', '五'];
        data.sections.forEach((sec, i) => {
          const div = document.createElement('div');
          div.className = 'section';
          div.innerHTML = `<p class="section-num">${nums[i]}、${sec.title.toUpperCase()}</p>
            <h2 class="section-title">${sec.title}</h2>
            ${sec.paragraphs.map(p => `<p>${p}</p>`).join('')}`;
          container.appendChild(div);
        });

        // Contact block
        const c = data.contact;
        document.getElementById('contact-block').style.display = 'block';
        const grid = document.getElementById('contact-grid');
        grid.innerHTML = `
          <div>
            <div class="contact-item">
              <div class="contact-label">ADDRESS</div>
              <div class="contact-value">${c.address}</div>
            </div>
            <div class="contact-item">
              <div class="contact-label">PHONE</div>
              <div class="contact-value"><a href="tel:${c.phone}">${c.phone}</a></div>
            </div>
            <div class="contact-item">
              <div class="contact-label">EMAIL</div>
              <div class="contact-value"><a href="mailto:${c.email}">${c.email}</a></div>
            </div>
          </div>
          <div>
            <div class="contact-label" style="margin-bottom:14px;">SOCIAL</div>
            <ul class="social-list">
              ${c.social.map(s => `
                <li><a href="${s.url}" target="_blank" rel="noopener">
                  <span class="social-tag">${s.platform.toUpperCase()}</span>
                  ${s.handle}
                </a></li>`).join('')}
            </ul>
          </div>`;
      });
  </script>
</body>
</html>
